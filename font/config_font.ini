[general]
Resolution = 96
FontSize = 450
Font = cuprum.ttf
Base = 25
NbChar = 65535
SpaceWidth = 20
SpaceBetweenCharacters = 4
ITFReferenceFile = font_default.itf

# Single-byte SJIS slots remapped onto Russian letters (worked example).
#   key   = source character (a halfwidth katakana char or a rare ASCII char)
#           that the engine encodes as ONE SJIS byte.
#   value = the letter whose glyph from the TTF replaces the source.
# The engine sees a 1-byte code and counts it as 1 character-cell, so layout
# math (widths, indents, truncation) stays correct.
# Edit this section to retarget the toolkit for a different alphabet.
